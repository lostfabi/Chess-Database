name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

  update-docs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 2

      - name: Install Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Analyze changes and update docs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DIFF=$(git diff HEAD~1 HEAD -- src/ --stat)
          DIFF_DETAIL=$(git diff HEAD~1 HEAD -- src/ | head -c 8000)

          claude -p "
          You are maintaining project documentation for a chess management app.
          Analyze the following git diff and update the docs/ tracking files accordingly.

          Rules:
          - docs/Implemented_Features.md: features whose implementation is complete
          - docs/In_Progress.md: features that are partially implemented or being worked on
          - docs/Planed_Features.md: newly discovered planned features not yet started

          Move items between files as appropriate based on what the diff shows.
          Add new entries if the diff introduces something not yet tracked.
          Do not remove entries unless the feature was clearly deleted.
          Keep the existing markdown structure and style of each file.

          Git stat:
          $DIFF

          Git diff (truncated to 8000 chars):
          $DIFF_DETAIL

          Read the three docs files first, then update them.
          " --allowedTools "Read,Edit" --output-format text

      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "docs: auto-update feature tracking [skip ci]"
          git push

  deploy-docs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Upload docs to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4